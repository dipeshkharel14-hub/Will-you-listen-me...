<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Celebration 🎈</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{height:100vh;background:radial-gradient(circle at top,#f8b500,#ff6f61);display:flex;justify-content:center;align-items:center;overflow:hidden;font-family:Poppins;color:white;}
.particle{position:absolute;width:5px;height:5px;background:rgba(255,255,255,0.6);border-radius:50%;animation:float 6s linear infinite;}
@keyframes float{from{transform:translateY(100vh);opacity:0;}to{transform:translateY(-10vh);opacity:1;}}
.wrapper{width:95%;max-width:420px;padding:25px;border-radius:30px;border:2px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.15);backdrop-filter:blur(25px);box-shadow:0 0 60px rgba(0,0,0,0.35);animation:pop 1s ease;}
@keyframes pop{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.card{background:rgba(255,255,255,0.22);border-radius:22px;padding:35px 25px;text-align:center;}
.top-emojis{font-size:22px;margin-bottom:10px;animation:pulse 2s infinite;}
@keyframes pulse{50%{transform:scale(1.15);}}
h1{font-size:22px;margin-bottom:8px;}
.subtitle{font-size:14px;opacity:0.9;margin-bottom:25px;}
.btn{width:100%;padding:13px;border-radius:30px;border:none;font-size:15px;margin-top:12px;cursor:pointer;position:relative;overflow:hidden;transition:0.25s;}
.btn::after{content:"";position:absolute;width:20px;height:20px;background:rgba(255,255,255,0.5);border-radius:50%;transform:scale(0);opacity:0;}
.btn:active::after{animation:ripple 0.6s ease;}
@keyframes ripple{from{transform:scale(0);opacity:1;}to{transform:scale(12);opacity:0;}}
.yes{background:linear-gradient(45deg,#ff4d6d,#ff8fa3);color:white;font-weight:600;box-shadow:0 0 30px rgba(255,100,150,0.7);}
.ghost{background:rgba(255,255,255,0.4);color:white;}
.no{background:rgba(255,255,255,0.25);color:white;}
.float{position:absolute;font-size:26px;animation:balloon 4s ease-in infinite;}
@keyframes balloon{0%{transform:translateY(100vh) scale(0.4);opacity:0;}20%{opacity:1;}100%{transform:translateY(-10vh) scale(1.5);opacity:0;}}
.firework{position:absolute;width:6px;height:6px;border-radius:50%;background:white;animation:explode 1s ease-out forwards;}
@keyframes explode{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0;}}
</style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <div class="top-emojis">🎉 🎂 🎈</div>
        <h1 id="greetingTitle">Hello!</h1>
        <div class="subtitle" id="greetingSub">Do you want to celebrate today? 😄✨</div>
        <button class="btn yes" onclick="yesClick()">Yes 🎉</button>
        <button class="btn ghost" onclick="ghostClick()">Ghost 👻</button>
        <button class="btn no" id="noBtn">No 🙈</button>
    </div>
</div>

<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-love-ambient-11066.mp3"></audio>

<script>
document.addEventListener("click", ()=>{
    const music=document.getElementById("music");
    music.play().then(()=>{music.pause(); music.currentTime=0;}).catch(()=>{});
},{once:true});

function createParticle(){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),6000);
}
setInterval(createParticle,100);

function fireworkBurst(){
    for(let i=0;i<25;i++){
        const f=document.createElement("div");
        f.className="firework";
        f.style.left=Math.random()*100+"vw";
        f.style.top=Math.random()*100+"vh";
        f.style.setProperty('--x',`${Math.random()*200-100}px`);
        f.style.setProperty('--y',`${Math.random()*200-100}px`);
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
    }
}

function floatItems(){
    const el=document.createElement("div");
    el.className="float";
    el.innerHTML=["🎉","🎂","✨","🎈"][Math.floor(Math.random()*4)];
    el.style.left=Math.random()*100+"vw";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
}

function yesClick(){
    const music=document.getElementById("music");
    music.volume=0;
    music.play().catch(()=>{});
    let fade=setInterval(()=>{
        if(music.volume<1) music.volume+=0.05;
        else clearInterval(fade);
    },120);

    setInterval(floatItems,120);
    setInterval(fireworkBurst,900);

    const win=window.open("", "_blank");
    win.document.write(`
    <html>
    <head>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
    body{margin:0;height:100vh;background:radial-gradient(circle,#ffda79,#ff6f61);display:flex;justify-content:center;align-items:center;overflow:hidden;color:white;font-family:'Great Vibes',cursive;}
    .container{display:flex;align-items:center;gap:50px;}
    .side{font-size:28px;animation:sway 3s ease-in-out infinite;}
    @keyframes sway{50%{transform:translateY(-12px);}}
    .title{font-size:34px;margin-bottom:25px;}
    .poem{font-size:26px;max-width:500px;line-height:1.7;text-align:center;}
    .float{position:absolute;font-size:26px;animation:balloon 4s ease-in infinite;}
    @keyframes balloon{0%{transform:translateY(100vh) scale(0.4);opacity:0;}20%{opacity:1;}100%{transform:translateY(-10vh) scale(1.5);opacity:0;}}
    </style>
    </head>
    <body>
    <div class="container">
        <div class="side">🎉✨🎈</div>
        <div>
            <div class="title">Happy Birthday to You 🎂✨</div>
            <div class="poem">
                आजको यो सुन्दर दिनमा,<br><br>
                खुशीका रङ्गहरू फैलिऊन् जीवनमा।<br>
                हाँसोले भरियोस् हरेक पल,<br>
                उज्यालो बनोस् भविष्यको बाटो सफल।<br><br>
                सपना सबै पुरा हुँदै जाऊन्,<br>
                मायाले भरिएका क्षणहरू आउन्।<br>
                जन्मदिनको लाखौँ शुभकामना,<br>
                सधैँ रहोस् मुस्कानको चमक सुहाना ✨🎉
                                  -by:Dipesh Kharel
            </div>
        </div>
        <div class="side">🎈🎉✨</div>
    </div>
    <script>
    function floatItems(){
        const el=document.createElement("div");
        el.className="float";
        el.innerHTML=["🎉","🎂","✨","🎈"][Math.floor(Math.random()*4)];
        el.style.left=Math.random()*100+"vw";
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),4000);
    }
    setInterval(floatItems,150);
    <\/script>
    </body>
    </html>
    `);
}

function ghostClick(){
    const win=window.open("", "_blank");
    win.document.write(`
    <html>
    <body style="margin:0;height:100vh;background:black;color:white;display:flex;justify-content:center;align-items:center;font-family:Poppins;overflow:hidden;">
        <h2>Please try the Celebrate button! 😄✨</h2>
        <script>
        function ghostFly(){
            const g=document.createElement("div");
            g.style.position="absolute";
            g.style.fontSize="30px";
            g.innerHTML="👻";
            g.style.left=Math.random()*100+"vw";
            g.style.top=Math.random()*80+"vh";
            document.body.appendChild(g);
            setTimeout(()=>g.remove(),3000);
        }
        setInterval(ghostFly,220);
        <\/script>
    </body>
    </html>
    `);
}

const noBtn=document.getElementById("noBtn");
let stage=0;
function dodge(){
    noBtn.style.transform=`translate(${Math.random()*120-60}px,${Math.random()*30}px)`;
}
noBtn.addEventListener("mouseover",dodge);
noBtn.addEventListener("click",()=>{
    stage++;
    if(stage===1) noBtn.innerText="Try Again 😄";
    if(stage===2) noBtn.innerText="Still No? 🙈";
    if(stage===3) noBtn.innerText="Click Celebrate 🎉";
    dodge();
});
</script>

</body>
</html>
